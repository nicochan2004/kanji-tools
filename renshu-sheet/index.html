<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字練習シート</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="app-header no-print">
      <h1>漢字練習シート</h1>
      <p class="sub">漢字や送り仮名つきの単語（最大4文字）を最大18個まで入力できます。入力すると下にプレビューが表示されます。</p>
    </header>

    <section class="input-area no-print">
      <div class="kai-input-row">
        <label for="kaiInput">第　　回（数字を入力）</label>
        <input id="kaiInput" type="text" inputmode="numeric" maxlength="3" placeholder="例: 1">
      </div>
      <div id="inputGroups"></div>
      <div class="actions">
        <button id="pdfBtn" class="primary">印刷</button>
        <button id="clearBtn" class="secondary">すべて消去</button>
      </div>
      <p class="hint">※「印刷」を押すとPDFファイルが保存されます。保存したPDFを開いて印刷してください（iPhoneはAirPrint対応のWi-Fiプリンタが必要です）。スマホでもレイアウトが崩れません。</p>
    </section>

    <section id="preview" class="preview-area"></section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
